<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support | JE Fitness</title>
    <meta name="description" content="Get help, report a bug, or suggest a feature to the JE Fitness team. Submit a support ticket and we'll get back to you.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://jefitness.com/support">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Support | JE Fitness">
    <meta property="og:description" content="Get help, report a bug, or suggest a feature to the JE Fitness team.">
    <meta property="og:url" content="https://jefitness.com/support">
    <meta property="og:site_name" content="JE Fitness">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link href="/fonts/bootstrap-icons.css?v=dea7aab" rel="stylesheet">
    <link rel="preload" href="../styles/styles.css?v=dea7aab" as="style">
    <link rel="stylesheet" href="../styles/styles.css?v=dea7aab">
    <link rel="stylesheet" href="../dist/styles.css?v=dea7aab">
    <link rel="stylesheet" href="../styles/support.css?v=dea7aab">

    <link rel="apple-touch-icon" sizes="180x180" href="../favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../favicons/favicon-16x16.png">
    <link rel="manifest" href="../favicons/site.webmanifest">
</head>
<body class="support-page">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <div class="d-flex align-items-center">
                <a class="navbar-brand fw-bold me-3" href="/dashboard" id="brand-link">JEFITNESS</a>
                <span id="subscription-status-navbar" class="badge bg-secondary text-white small">
                    <span class="gym-spinner gym-spinner--sm me-1"></span>
                </span>
            </div>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-lg-center">
                    <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/subscriptions">Subscription</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/support">Support</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" id="logoutButton">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="py-5">
        <div class="container" style="max-width:800px">

            <!-- Alert container -->
            <div id="alertContainer" class="mb-4"></div>

            <!-- Page header -->
            <div class="support-header mb-5">
                <div class="d-flex align-items-start justify-content-between flex-wrap gap-3">
                    <div>
                        <h1 class="support-title">Support</h1>
                        <p class="support-subtitle">Have an issue or idea? Let us know.</p>
                    </div>
                    <button class="btn support-btn-new d-none" id="btn-new-ticket">
                        <i class="bi bi-plus-lg me-1"></i> New Ticket
                    </button>
                </div>
                <!-- Rate limit banner -->
                <div id="rate-limit-banner" class="support-rate-banner d-none mt-3">
                    <i class="bi bi-clock me-2"></i>
                    <span id="rate-limit-text"></span>
                </div>
            </div>

            <!-- Ticket form -->
            <div id="ticket-form-wrap" class="support-card mb-5">
                <div class="support-card-header">
                    <h2 class="support-card-title">
                        <i class="bi bi-ticket-fill me-2" style="color:#6366f1"></i>
                        <span id="form-title">New Ticket</span>
                    </h2>
                </div>
                <div class="support-card-body">
                    <form id="ticket-form" novalidate>
                        <input type="hidden" id="edit-ticket-id" value="">

                        <div class="mb-4">
                            <label class="support-label" for="ticket-category">Category</label>
                            <select class="support-select" id="ticket-category" required>
                                <option value="" disabled selected>Select a category…</option>
                                <option value="bug-report">Bug Report</option>
                                <option value="feature-request">Feature Request</option>
                                <option value="billing-issue">Billing Issue</option>
                                <option value="account-issue">Account Issue</option>
                                <option value="general-inquiry">General Inquiry</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="support-label" for="ticket-subject">Subject</label>
                            <input type="text" class="support-input" id="ticket-subject" maxlength="120"
                                placeholder="Brief summary of your issue or idea" required>
                            <div class="support-char-count"><span id="subject-count">0</span> / 120</div>
                        </div>

                        <div class="mb-4">
                            <label class="support-label" for="ticket-description">Description</label>
                            <textarea class="support-textarea" id="ticket-description" maxlength="2000" rows="6"
                                placeholder="Please describe your issue or idea in detail…" required></textarea>
                            <div class="support-char-count"><span id="desc-count">0</span> / 2000</div>
                        </div>

                        <div class="d-flex gap-3 justify-content-end flex-wrap">
                            <button type="button" class="btn support-btn-cancel d-none" id="btn-cancel-edit">
                                Cancel
                            </button>
                            <button type="button" class="btn support-btn-draft" id="btn-save-draft">
                                <i class="bi bi-floppy me-1"></i> Save Draft
                            </button>
                            <button type="submit" class="btn support-btn-submit" id="btn-submit-ticket">
                                <i class="bi bi-send me-1"></i> Submit Ticket
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- My Tickets -->
            <div id="my-tickets-wrap" class="d-none">
                <div class="d-flex align-items-center justify-content-between mb-3">
                    <h2 class="support-section-title">My Tickets</h2>
                    <span id="tickets-count-badge" class="support-count-badge"></span>
                </div>
                <div id="tickets-loading" class="text-center py-4 d-none">
                    <div class="spinner-border spinner-border-sm text-secondary" role="status"></div>
                    <span class="ms-2 text-muted small">Loading tickets…</span>
                </div>
                <div id="tickets-list"></div>
                <!-- Pagination -->
                <div id="tickets-pagination" class="d-flex justify-content-center gap-2 mt-4 d-none"></div>
            </div>

        </div>
    </main>

    <!-- Delete confirmation modal -->
    <div class="modal fade" id="delete-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content support-modal">
                <div class="modal-body p-4 text-center">
                    <i class="bi bi-trash3 support-modal-icon-danger mb-3 d-block"></i>
                    <h5 class="support-modal-title mb-2">Delete Draft?</h5>
                    <p class="text-muted small mb-4">This draft will be permanently deleted.</p>
                    <div class="d-flex gap-2 justify-content-center">
                        <button type="button" class="btn support-btn-cancel" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn support-btn-danger" id="btn-confirm-delete">Delete</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.config.js?v=dea7aab"></script>
    <script src="/js/navbar-subscription.js?v=dea7aab"></script>
    <script src="/js/logout.js?v=dea7aab"></script>
    <script src="/js/role-guard.js?v=dea7aab"></script>
    <script src="/js/support.js?v=dea7aab"></script>
</body>
</html>

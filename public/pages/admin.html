<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JE Fitness Admin Panel — Manage Users &amp; System</title>
  <link rel="apple-touch-icon" sizes="180x180" href="../favicons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../favicons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../favicons/favicon-16x16.png">
  <link rel="manifest" href="../favicons/site.webmanifest">
  <meta name="description" content="JE Fitness admin panel for managing users, subscriptions, system logs, and platform oversight. Restricted to authorized administrators only." />
  <link rel="canonical" href="https://jefitness.com/admin" />
  <meta name="robots" content="noindex, nofollow" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="JE Fitness Admin Panel — Manage Users &amp; System" />
  <meta property="og:description" content="JE Fitness admin panel for managing users, subscriptions, system logs, and platform oversight. Restricted to authorized administrators only." />
  <meta property="og:url" content="https://jefitness.com/admin" />
  <meta property="og:site_name" content="JE Fitness" />
  <link rel="stylesheet" href="/dist/styles.css" />
  <link rel="stylesheet" href="/fonts/bootstrap-icons.css" />
  <link rel="stylesheet" href="/styles/client-modal.css" />
  <style>
    /* ── Reset & base ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f172a; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; font-size: 13px; display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar ──────────────────────────────────────── */
    #sidebar {
      width: 56px; background: #1e293b; border-right: 1px solid #334155;
      display: flex; flex-direction: column; align-items: center;
      padding: 12px 0; gap: 4px; transition: width 0.2s ease;
      overflow: hidden; position: relative; z-index: 10; flex-shrink: 0;
    }
    #sidebar:hover { width: 200px; }
    .sidebar-logo {
      width: 36px; height: 36px; background: #6366f1; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 14px; color: white; flex-shrink: 0; margin-bottom: 12px;
    }
    .nav-item {
      width: calc(100% - 8px); display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: 8px; cursor: pointer; color: #94a3b8;
      white-space: nowrap; transition: background 0.15s, color 0.15s; border: none;
      background: transparent; text-align: left; font-size: 12px; font-weight: 500;
    }
    .nav-item:hover { background: #334155; color: #e2e8f0; }
    .nav-item.active { background: #6366f1; color: white; }
    .nav-icon { font-size: 16px; flex-shrink: 0; width: 20px; text-align: center; }
    .nav-label { opacity: 0; transition: opacity 0.15s 0.05s; }
    #sidebar:hover .nav-label { opacity: 1; }
    .nav-divider { width: 32px; height: 1px; background: #334155; margin: 6px auto; flex-shrink: 0; }
    #sidebar:hover .nav-divider { width: calc(100% - 16px); }
    .sidebar-bottom { margin-top: auto; display: flex; flex-direction: column; align-items: center; gap: 4px; width: 100%; padding: 0 4px; }
    .admin-avatar {
      width: 32px; height: 32px; background: #7c3aed; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: white; flex-shrink: 0;
    }

    /* ── Main layout ──────────────────────────────────── */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Topbar ───────────────────────────────────────── */
    #topbar {
      height: 52px; background: #1e293b; border-bottom: 1px solid #334155;
      display: flex; align-items: center; padding: 0 20px; gap: 12px; flex-shrink: 0;
    }
    #topbar-title { font-size: 15px; font-weight: 600; color: #f1f5f9; flex: 1; }
    .badge { padding: 3px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; }
    .badge-red { background: #450a0a; color: #f87171; }
    .badge-green { background: #052e16; color: #4ade80; }

    /* ── Content area ─────────────────────────────────── */
    #view-container { flex: 1; overflow-y: auto; padding: 16px 20px; }

    /* ── Cards ────────────────────────────────────────── */
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 10px; }
    .card-header { padding: 12px 16px; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 10px; }
    .card-title { font-size: 13px; font-weight: 600; color: #f1f5f9; flex: 1; }

    /* ── Stat cards ───────────────────────────────────── */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
    .stat-card { padding: 14px 16px; }
    .stat-label { font-size: 10px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
    .stat-value { font-size: 24px; font-weight: 700; color: #f1f5f9; }
    .stat-sub { font-size: 10px; color: #64748b; margin-top: 4px; }
    .stat-green .stat-value { color: #4ade80; }
    .stat-red .stat-value { color: #f87171; }
    .stat-blue .stat-value { color: #60a5fa; }

    /* ── Table ────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th { padding: 9px 14px; text-align: left; font-size: 10px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid #334155; }
    td { padding: 10px 14px; border-bottom: 1px solid #1a2332; font-size: 12px; color: #cbd5e1; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: rgba(15,23,42,.3); }
    .cb { width: 14px; height: 14px; border-radius: 3px; accent-color: #6366f1; cursor: pointer; }
    .avatar { width: 28px; height: 28px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: white; margin-right: 8px; vertical-align: middle; flex-shrink: 0; }

    /* ── Pills ────────────────────────────────────────── */
    .pill { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; }
    .pill-green { background: #052e16; color: #4ade80; }
    .pill-gray { background: #1e293b; color: #64748b; border: 1px solid #334155; }
    .pill-yellow { background: #1c1506; color: #fbbf24; }
    .pill-red { background: #2d0b0b; color: #f87171; }

    /* ── Buttons ──────────────────────────────────────── */
    .btn { padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; border: none; }
    .btn-primary { background: #6366f1; color: white; }
    .btn-ghost { background: #334155; color: #94a3b8; }
    .btn-danger { background: #7f1d1d; color: #fca5a5; }
    .btn-sm { padding: 3px 8px; font-size: 10px; border-radius: 5px; cursor: pointer; border: none; font-weight: 600; }
    .btn-sm-blue { background: #1e3a5f; color: #60a5fa; }
    .btn-sm-green { background: #052e16; color: #4ade80; }
    .btn-sm-red { background: #2d0b0b; color: #f87171; }

    /* ── Search input ─────────────────────────────────── */
    .search-input {
      background: #0f172a; border: 1px solid #334155; border-radius: 6px;
      padding: 5px 10px; color: #e2e8f0; font-size: 12px; outline: none; width: 220px;
    }
    .search-input:focus { border-color: #6366f1; }
    .search-input::placeholder { color: #475569; }

    /* ── Bulk bar ─────────────────────────────────────── */
    #bulk-bar {
      background: #312e81; border: 1px solid #4338ca; border-radius: 8px;
      padding: 8px 14px; display: none; align-items: center; gap: 10px;
      margin-bottom: 12px; font-size: 12px;
    }
    #bulk-bar.visible { display: flex; }
    #bulk-count { font-weight: 600; color: #c7d2fe; }

    /* ── Log panel ────────────────────────────────────── */
    .log-panel { background: #0f172a; border: 1px solid #334155; border-radius: 10px; font-family: 'Fira Code', 'Courier New', monospace; font-size: 11px; }
    .log-entry { padding: 6px 14px; border-bottom: 1px solid #1a2332; display: flex; gap: 10px; align-items: flex-start; }
    .log-entry:last-child { border-bottom: none; }
    .log-time { color: #475569; flex-shrink: 0; width: 70px; }
    .log-level { flex-shrink: 0; width: 44px; font-weight: 700; }
    .log-info { color: #60a5fa; }
    .log-warn { color: #fbbf24; }
    .log-error { color: #f87171; }
    .log-debug { color: #94a3b8; }
    .log-http { color: #a78bfa; }
    .log-msg { color: #94a3b8; flex: 1; word-break: break-word; }
    .live-dot { width: 7px; height: 7px; background: #4ade80; border-radius: 50%; animation: pulse 1.5s infinite; flex-shrink: 0; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── Filter pills ─────────────────────────────────── */
    .filter-pill {
      padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 600;
      cursor: pointer; border: 1px solid #334155; background: #1e293b; color: #94a3b8;
    }
    .filter-pill.active { background: #6366f1; border-color: #6366f1; color: white; }

    /* ── Modal ────────────────────────────────────────── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.6);
      display: none; align-items: center; justify-content: center; z-index: 100;
    }
    .modal-backdrop.visible { display: flex; }
    .modal-box {
      background: #1e293b; border: 1px solid #334155; border-radius: 14px;
      width: 440px; padding: 24px; box-shadow: 0 25px 60px rgba(0,0,0,.5); max-height: 90vh; overflow-y: auto;
    }
    .modal-title { font-size: 16px; font-weight: 700; color: #f1f5f9; margin-bottom: 4px; }
    .modal-sub { font-size: 12px; color: #64748b; margin-bottom: 20px; }
    .form-label { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; display: block; }
    .form-field { margin-bottom: 16px; }
    .plan-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    .plan-tile {
      background: #0f172a; border: 2px solid #334155; border-radius: 8px;
      padding: 12px; cursor: pointer; transition: border-color 0.15s;
    }
    .plan-tile:hover { border-color: #6366f1; }
    .plan-tile.selected { border-color: #6366f1; background: #1e1b4b; }
    .plan-tile-name { font-size: 13px; font-weight: 600; color: #e2e8f0; }
    .plan-tile-price { font-size: 11px; color: #64748b; margin-top: 2px; }
    .plan-tile-badge { font-size: 9px; font-weight: 700; background: #312e81; color: #a5b4fc; padding: 1px 6px; border-radius: 20px; display: inline-block; margin-top: 4px; }
    .override-box { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 14px; margin-bottom: 16px; }
    .toggle-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .toggle-switch { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-track { position: absolute; inset: 0; background: #334155; border-radius: 20px; cursor: pointer; transition: background 0.2s; }
    .toggle-switch input:checked + .toggle-track { background: #6366f1; }
    .toggle-track::after { content: ''; position: absolute; left: 3px; top: 3px; width: 14px; height: 14px; background: white; border-radius: 50%; transition: left 0.2s; }
    .toggle-switch input:checked + .toggle-track::after { left: 19px; }
    .override-desc { font-size: 11px; color: #64748b; margin-bottom: 10px; }
    .days-row { display: flex; align-items: center; gap: 8px; }
    .days-input { width: 80px; background: #1e293b; border: 1px solid #6366f1; border-radius: 6px; padding: 7px 10px; color: #e2e8f0; font-size: 13px; font-weight: 600; outline: none; text-align: center; }
    .days-computed { font-size: 11px; color: #94a3b8; }
    .days-computed span { color: #4ade80; font-weight: 600; }
    .summary-box { background: #0f172a; border-radius: 8px; padding: 12px 14px; margin-bottom: 18px; }
    .summary-row { display: flex; justify-content: space-between; font-size: 12px; color: #94a3b8; margin-bottom: 6px; }
    .summary-row:last-child { margin-bottom: 0; }
    .summary-val { color: #e2e8f0; }
    .modal-footer { display: flex; gap: 8px; justify-content: flex-end; }
    .stripe-note { font-size: 10px; color: #475569; margin-top: 10px; text-align: right; }

    /* ── Skeleton loader ──────────────────────────────── */
    .skeleton { background: #1e293b; border-radius: 4px; animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:.5} }

    /* ── Pagination ───────────────────────────────────── */
    .pagination { display: flex; align-items: center; gap: 6px; padding: 12px 16px; border-top: 1px solid #334155; }
    .page-btn { padding: 4px 10px; border-radius: 5px; font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid #334155; background: #0f172a; color: #94a3b8; }
    .page-btn:hover:not(:disabled) { border-color: #6366f1; color: #a5b4fc; }
    .page-btn:disabled { opacity: .4; cursor: not-allowed; }
    .page-btn.current { background: #6366f1; border-color: #6366f1; color: white; }
    .page-info { font-size: 11px; color: #475569; margin-left: auto; }
  </style>
</head>
<body>

<!-- ── Sidebar ──────────────────────────────────────── -->
<nav id="sidebar">
  <div class="sidebar-logo">JE</div>

  <button class="nav-item active" data-view="overview">
    <i class="bi bi-bar-chart-fill nav-icon"></i>
    <span class="nav-label">Overview</span>
  </button>
  <button class="nav-item" data-view="clients">
    <i class="bi bi-people-fill nav-icon"></i>
    <span class="nav-label">Clients</span>
  </button>
  <button class="nav-item" data-view="logs">
    <i class="bi bi-terminal-fill nav-icon"></i>
    <span class="nav-label">Logs</span>
  </button>
  <button class="nav-item" data-view="tickets">
    <i class="bi bi-ticket-fill nav-icon"></i>
    <span class="nav-label">Tickets <span id="tickets-unread-badge" style="display:none;background:#f87171;color:#fff;border-radius:20px;padding:1px 6px;font-size:9px;font-weight:700;margin-left:4px"></span></span>
  </button>

  <div class="nav-divider"></div>

  <div class="sidebar-bottom">
    <div class="admin-avatar" id="admin-initials">AD</div>
  </div>
</nav>

<!-- ── Main ─────────────────────────────────────────── -->
<div id="main">
  <header id="topbar">
    <h1 style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0">JE Fitness Admin Panel</h1>
    <span id="topbar-title">Overview</span>
    <span class="badge badge-green" id="health-badge">● System Healthy</span>
    <span class="badge badge-red" id="error-badge" style="display:none"></span>
    <span style="font-size:11px;color:#475569" id="topbar-date"></span>
  </header>
  <div id="view-container"></div>
</div>

<!-- ── Client Quick-View Modal ───────────────────────── -->
<div id="client-modal-backdrop">
  <div id="client-modal-box"></div>
</div>

<!-- ── Subscription Modal ───────────────────────────── -->
<div class="modal-backdrop" id="sub-modal">
  <div class="modal-box">
    <div class="modal-title">Add Subscription</div>
    <div class="modal-sub" id="sub-modal-client">Client: —</div>

    <div class="form-label">Select Plan</div>
    <div class="plan-grid" id="plan-grid"></div>

    <div class="override-box">
      <div class="toggle-row">
        <label class="toggle-switch">
          <input type="checkbox" id="override-toggle">
          <span class="toggle-track"></span>
        </label>
        <span style="font-size:12px;font-weight:600;color:#e2e8f0">Override days remaining</span>
      </div>
      <div class="override-desc">Default is the full plan duration. Override to prorate or comp partial access.</div>
      <div class="days-row" id="days-row" style="display:none">
        <input type="number" class="days-input" id="days-input" min="1" value="30">
        <span class="days-computed">days → expires <span id="days-expiry">—</span></span>
      </div>
    </div>

    <div class="form-label">Summary</div>
    <div class="summary-box" id="sub-summary"></div>

    <div class="modal-footer">
      <button class="btn btn-ghost" id="sub-cancel">Cancel</button>
      <button class="btn btn-primary" id="sub-confirm">⚡ Create via Stripe</button>
    </div>
    <div class="stripe-note">Creates a real Stripe subscription then syncs to MongoDB</div>
  </div>
</div>

<!-- ── Scripts ───────────────────────────────────────── -->
<script src="/js/api.config.js"></script>
<script src="/js/admin/components/subscription-modal.js"></script>
<script src="/js/admin/components/client-modal.js"></script>
<script src="/js/admin/views/overview.js"></script>
<script src="/js/admin/views/clients.js"></script>
<script src="/js/admin/views/logs.js"></script>
<script src="/js/admin/views/tickets.js"></script>
<script src="/js/admin/index.js"></script>
</body>
</html>

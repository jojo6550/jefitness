<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trainer Portal | JE Fitness</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="stylesheet" href="../styles/trainer-dashboard.css">
</head>
<body class="trainer-window-mode">
    <div class="window-overlay">
        <div class="app-window animate__animated animate__zoomIn">
            <!-- Window Header -->
            <header class="window-header">
                <div class="window-controls">
                    <span class="control close"></span>
                    <span class="control minimize"></span>
                    <span class="control maximize"></span>
                </div>
                <div class="window-tabs d-flex gap-3 ms-4">
                    <button class="tab-btn active" id="tabSchedule" data-tab="schedule">Schedule</button>
                    <button class="tab-btn" id="tabClients" data-tab="clients">Clients</button>
                    <button class="tab-btn" id="tabAvailability" data-tab="availability">Availability</button>
                    <button class="tab-btn" id="tabNotifications" data-tab="notifications">Notifications</button>
                </div>
                <div class="window-title flex-grow-1 text-center">
                    <i class="bi bi-calendar3 me-2 text-primary"></i>
                    <span id="windowTitleText">Schedule Manager</span>
                </div>
                <div class="window-actions">
                    <button id="refreshBtn" class="action-btn" title="Refresh">
                        <i class="bi bi-arrow-clockwise"></i>
                    </button>
                    <a href="/trainer-guide" class="action-btn no-underline" title="Trainer Guide">
                        <i class="bi bi-question-circle"></i>
                    </a>
                    <button id="logoutButton" class="action-btn text-danger" title="Logout">
                        <i class="bi bi-power"></i>
                    </button>
                </div>
            </header>

            <!-- Schedule sub-tabs (Active / Logged Sessions) -->
            <div id="scheduleSubtabs" class="window-search-bar">
                <div class="d-flex gap-3 mb-3">
                    <button class="tab-btn active" id="activeTab">Active</button>
                    <button class="tab-btn" id="loggedTab">Logged Sessions</button>
                </div>
                <div class="search-inner">
                    <i class="bi bi-search"></i>
                    <input type="text" id="appointmentSearch" placeholder="Filter by client name...">
                </div>
            </div>

            <!-- Clients search bar -->
            <div id="clientsSearchBar" class="window-search-bar d-none">
                <div class="search-inner">
                    <i class="bi bi-search"></i>
                    <input type="text" id="clientSearch" placeholder="Search clients...">
                </div>
            </div>

            <!-- Notifications header bar -->
            <div id="notificationsHeader" class="window-search-bar d-none">
                <div class="d-flex align-items-center">
                    <span class="avail-header-label">
                        <i class="bi bi-bell me-2"></i>Email notification preferences
                    </span>
                </div>
            </div>

            <!-- Availability header bar -->
            <div id="availabilityHeader" class="window-search-bar d-none">
                <div class="d-flex align-items-center justify-content-between">
                    <span class="avail-header-label">
                        <i class="bi bi-clock me-2"></i>Weekly recurring schedule
                    </span>
                    <button id="saveAvailabilityBtn" class="btn btn-sm btn-primary rounded-pill px-3">
                        <i class="bi bi-check2 me-1"></i>Save Schedule
                    </button>
                </div>
            </div>

            <!-- Window Content -->
            <div class="window-body">

                <!-- SCHEDULE PANEL -->
                <div id="panelSchedule" class="panel-content d-flex flex-column">
                    <div id="appointmentsList" class="flex-grow-1">
                        <div class="window-loading">
                            <div class="spinner-border text-primary spinner-border-sm me-2"></div>
                            <span>Synchronizing sessions...</span>
                        </div>
                    </div>
                    <div id="appointmentsPagination" class="p-3"></div>
                    <div id="bulkActionPanel" class="flex-shrink-0"></div>
                </div>

                <!-- CLIENTS PANEL -->
                <div id="panelClients" class="panel-content d-none">
                    <div id="clientsList">
                        <div class="window-loading">
                            <div class="spinner-border text-primary spinner-border-sm me-2"></div>
                            <span>Loading clients...</span>
                        </div>
                    </div>
                    <div id="clientsPagination" class="p-3"></div>
                </div>

                <!-- AVAILABILITY PANEL -->
                <div id="panelAvailability" class="panel-content d-none">
                    <div id="availabilityGrid">
                        <div class="window-loading">
                            <div class="spinner-border text-primary spinner-border-sm me-2"></div>
                            <span>Loading schedule...</span>
                        </div>
                    </div>
                </div>

                <!-- NOTIFICATIONS PANEL -->
                <div id="panelNotifications" class="panel-content d-none">
                    <div class="p-4 w-max-560">
                        <h6 class="fw-bold mb-1">Appointment Email Notifications</h6>
                        <p class="text-muted small mb-4">Choose how you want to be notified when a client books an appointment with you.</p>

                        <div class="d-flex flex-column gap-3" id="notifOptions">
                            <label class="notif-option-card d-flex align-items-start gap-3 p-3 rounded-3 border cursor-pointer">
                                <input type="radio" name="emailPref" value="individual" class="mt-1 flex-shrink-0">
                                <div>
                                    <div class="fw-semibold">Individual email per booking</div>
                                    <div class="text-muted small">You receive an email immediately each time a client books an appointment.</div>
                                </div>
                            </label>
                            <label class="notif-option-card d-flex align-items-start gap-3 p-3 rounded-3 border cursor-pointer">
                                <input type="radio" name="emailPref" value="daily_digest" class="mt-1 flex-shrink-0">
                                <div>
                                    <div class="fw-semibold">Daily digest at midnight</div>
                                    <div class="text-muted small">One email sent at midnight listing all your clients scheduled for that day.</div>
                                </div>
                            </label>
                        </div>

                        <button id="saveNotifPrefBtn" class="btn btn-primary rounded-pill px-4 mt-4">
                            <i class="bi bi-check2 me-1"></i>Save Preference
                        </button>
                    </div>
                </div>

            </div>

            <!-- Window Footer -->
            <footer class="window-footer">
                <div class="footer-status" id="footerStatus">Ready</div>
                <div class="footer-version">v2.2.0</div>
            </footer>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content window-style-modal border-0">
          <div class="modal-body text-center p-4">
            <h6 class="fw-bold mb-3" id="confirmModalBody">Update session status?</h6>
            <div class="d-flex gap-2 justify-content-center">
                <button type="button" class="btn btn-sm btn-light rounded-pill px-3" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-sm btn-danger rounded-pill px-3" id="confirmActionBtn">Confirm</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Client Quick-View Modal -->
    <div class="modal-backdrop" id="client-modal-backdrop" style="position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:9999">
      <div class="modal-box" id="client-modal-box" style="background:#1e293b;border:1px solid #334155;border-radius:16px;width:480px;max-width:calc(100vw - 32px);max-height:90vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,.5);padding:0;overflow:hidden"></div>
    </div>
    <style>
      #client-modal-backdrop.visible { display:flex !important; }
      .cm-loading { display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:48px;color:#64748b;font-size:13px; }
      .cm-spinner { width:28px;height:28px;border:2px solid #334155;border-top-color:#6366f1;border-radius:50%;animation:cm-spin .7s linear infinite; }
      @keyframes cm-spin { to { transform:rotate(360deg); } }
      .cm-header { display:flex;align-items:center;gap:14px;padding:20px 20px 16px;border-bottom:1px solid #334155;position:relative; }
      .cm-avatar { width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:white;flex-shrink:0; }
      .cm-header-info { flex:1;min-width:0; }
      .cm-name { font-size:15px;font-weight:700;color:#f1f5f9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
      .cm-email { font-size:11px;color:#64748b;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:monospace; }
      .cm-close { position:absolute;top:16px;right:16px;background:none;border:none;color:#475569;font-size:16px;cursor:pointer;line-height:1;padding:4px; }
      .cm-close:hover { color:#e2e8f0; }
      .cm-grid { display:grid;grid-template-columns:1fr 1fr;gap:0;padding:4px 0; }
      .cm-field { padding:12px 20px;border-bottom:1px solid #1a2332; }
      .cm-field-full { grid-column:1/-1; }
      .cm-field-label { font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;margin-bottom:5px; }
      .cm-field-val { font-size:13px;color:#cbd5e1;font-weight:500; }
      .cm-pill { display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700; }
      .cm-pill-green { background:#052e16;color:#4ade80; }
      .cm-pill-red { background:#2d0b0b;color:#f87171; }
      .cm-pill-yellow { background:#1c1506;color:#fbbf24; }
      .cm-pill-gray { background:#1e293b;color:#64748b;border:1px solid #334155; }
      .cm-pill-indigo { background:#1e1b4b;color:#a5b4fc; }
      .cm-days-bar-wrap { flex:1;height:5px;background:#1e293b;border-radius:3px;overflow:hidden; }
      .cm-days-bar { height:100%;border-radius:3px;transition:width .3s ease; }
      .cm-footer { display:flex;gap:8px;justify-content:flex-end;padding:14px 20px;border-top:1px solid #334155; }
      .cm-btn { padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;text-decoration:none;display:inline-flex;align-items:center;gap:5px; }
      .cm-btn-ghost { background:#334155;color:#94a3b8; }
      .cm-btn-ghost:hover { background:#3d4f66;color:#e2e8f0; }
      .cm-btn-primary { background:#6366f1;color:white; }
      .cm-btn-primary:hover { background:#4f46e5;color:white; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.config.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/logout.js" defer></script>
    <script src="../js/admin/components/client-modal.js"></script>
    <script src="../js/trainer-dashboard.js"></script>
</body>
</html>

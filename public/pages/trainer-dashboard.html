<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trainer Portal | JE Fitness</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="stylesheet" href="../styles/trainer-dashboard.css">
</head>
<body class="trainer-window-mode">
    <div class="window-overlay">
        <div class="app-window animate__animated animate__zoomIn">
            <!-- Window Header -->
            <header class="window-header">
                <div class="window-controls">
                    <span class="control close"></span>
                    <span class="control minimize"></span>
                    <span class="control maximize"></span>
                </div>
                <div class="window-tabs d-flex gap-3 ms-4">
                    <button class="tab-btn active" id="activeTab">Active</button>
                    <button class="tab-btn" id="archiveTab">Archive</button>
                </div>
                <div class="window-title flex-grow-1 text-center">
                    <i class="bi bi-calendar3 me-2 text-primary"></i>
                    <span>Schedule Manager</span>
                </div>
                <div class="window-actions">
                    <button id="refreshAppointments" class="action-btn" title="Refresh">
                        <i class="bi bi-arrow-clockwise"></i>
                    </button>
                    <button id="logoutButton" class="action-btn text-danger" title="Logout">
                        <i class="bi bi-power"></i>
                    </button>
                </div>
            </header>

            <!-- Window Sidebar/Search -->
            <div class="window-search-bar">
                <div class="search-inner">
                    <i class="bi bi-search"></i>
                    <input type="text" id="appointmentSearch" placeholder="Filter by client name...">
                </div>
            </div>

            <!-- Window Content -->
            <div class="window-body" id="appointmentsList">
                <div class="window-loading">
                    <div class="spinner-border text-primary spinner-border-sm me-2"></div>
                    <span>Synchronizing sessions...</span>
                </div>
            </div>

            <!-- Window Footer -->
            <footer class="window-footer">
                <div class="footer-status" id="footerStatus">Ready</div>
                <div class="footer-version">v2.1.0</div>
            </footer>
        </div>
    </div>

    <!-- Confirmation Modal (Still needed for safety) -->
    <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content window-style-modal border-0">
          <div class="modal-body text-center p-4">
            <h6 class="fw-bold mb-3" id="confirmModalBody">Update session status?</h6>
            <div class="d-flex gap-2 justify-content-center">
                <button type="button" class="btn btn-sm btn-light rounded-pill px-3" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-sm btn-danger rounded-pill px-3" id="confirmActionBtn">Confirm</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.config.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/logout.js" defer></script>
    <script src="../js/trainer-dashboard.js"></script>
</body>
</html>

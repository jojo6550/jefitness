<body class="log-meal-page">
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <div class="d-flex align-items-center">
                <a class="navbar-brand fw-bold me-3" href="/dashboard">JEFITNESS</a>
            </div>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-lg-center">
                    <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/log-meal">Log Meal</a></li>
                    <li class="nav-item"><a class="nav-link" href="/nutrition-history">Nutrition History</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" id="logoutButton">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <h1 class="visually-hidden">Log Meal Nutrition – JE Fitness</h1>
        <div class="row justify-content-center">
            <div class="col-lg-9">
                <div class="card shadow-sm">
                    <div class="card-header bg-success text-white">
                        <h2 class="mb-0"><i class="bi bi-egg-fried me-2"></i>Log Meal</h2>
                    </div>
                    <div class="card-body">
                        <form id="mealForm" novalidate>

                            <div class="row g-3 mb-3">
                                <!-- Date -->
                                <div class="col-sm-6">
                                    <label for="mealDate" class="form-label fw-bold">Date <span class="text-danger">*</span></label>
                                    <input type="date" class="form-control" id="mealDate" required>
                                </div>
                                <!-- Meal Type -->
                                <div class="col-sm-6">
                                    <label for="mealType" class="form-label fw-bold">Meal Type <span class="text-danger">*</span></label>
                                    <select class="form-select" id="mealType" required>
                                        <option value="">Select meal type...</option>
                                        <option value="breakfast">Breakfast</option>
                                        <option value="lunch">Lunch</option>
                                        <option value="dinner">Dinner</option>
                                        <option value="snack">Snack</option>
                                    </select>
                                    <div class="invalid-feedback">Please select a meal type.</div>
                                </div>
                            </div>

                            <!-- Food Items -->
                            <div class="mb-4">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <label class="form-label fw-bold mb-0">Food Items <span class="text-danger">*</span></label>
                                    <button type="button" class="btn btn-sm btn-outline-success" id="addFoodBtn">
                                        <i class="bi bi-plus-circle"></i> Add Food
                                    </button>
                                </div>
                                <div id="foodsContainer">
                                    <!-- Food item cards injected here -->
                                </div>
                            </div>

                            <!-- Total Calories -->
                            <div class="alert alert-success d-flex align-items-center mb-4" id="totalCaloriesDisplay">
                                <i class="bi bi-fire me-2 fs-5"></i>
                                <span>Total Calories: <strong id="totalCaloriesValue">0</strong> kcal</span>
                            </div>

                            <!-- Notes -->
                            <div class="mb-4">
                                <label for="mealNotes" class="form-label fw-bold">Notes (Optional)</label>
                                <textarea class="form-control" id="mealNotes" rows="2"
                                          maxlength="500" placeholder="e.g., Post-workout meal, felt great!"></textarea>
                                <small class="text-muted">Maximum 500 characters</small>
                            </div>

                            <!-- Actions -->
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-success" id="saveMealBtn">
                                    <i class="bi bi-check-circle me-1"></i>Save Meal
                                </button>
                                <button type="button" class="btn btn-outline-secondary" id="cancelBtn">
                                    Cancel
                                </button>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="successToast" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">Meal logged successfully!</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
        <div id="errorToast" class="toast align-items-center text-bg-danger border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="errorToastMessage">An error occurred. Please try again.</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <footer class="text-center py-3 mt-4">
